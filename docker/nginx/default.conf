server {
    listen 80;
    server_name _;
    root /app/public;
    index index.php;

    client_max_body_size 100M;

    # Ficheiros públicos (áudio/vídeo/avatars) — sem passar pelo PHP.
    location /storage/ {
        alias /app/storage/app/public/;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Accept-Ranges bytes;
    }

    # Compatível com clientes que usam /api/media/... (web antigo / mobile).
    # Apenas contents/ e avatars/ — alinhado com MediaStreamController.
    location ~ ^/api/media/(contents|avatars)/(.+)$ {
        alias /app/storage/app/public/$1/$2;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Accept-Ranges bytes;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass backend:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
