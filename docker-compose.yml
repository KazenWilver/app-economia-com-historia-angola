services:
  mysql:
    image: mysql:8.0
    container_name: jindungo_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jindungo
      MYSQL_USER: jindungo
      MYSQL_PASSWORD: jindungo
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jindungo_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: jindungo_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy

  backend:
    build:
      context: ./docker/php
    container_name: jindungo_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Código da app (bind mount Windows — lento)
      - ./backend:/app
      # vendor em volume nativo Linux — evita o maior gargalo de I/O no Windows
      - jindungo_vendor:/app/vendor
      - jindungo_bootstrap_cache:/app/bootstrap/cache
      - jindungo_storage_framework:/app/storage/framework
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: jindungo
      DB_USERNAME: jindungo
      DB_PASSWORD: jindungo
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      BCRYPT_ROUNDS: "10"
      APP_DEBUG: "false"
      # artisan serve: vários workers em paralelo
      PHP_CLI_SERVER_WORKERS: "4"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "if [ ! -f /app/vendor/autoload.php ]; then
        composer install --no-interaction --prefer-dist --optimize-autoloader;
      fi &&
      php artisan config:clear &&
      php artisan serve --host=0.0.0.0 --port=8000 --no-reload"

volumes:
  mysql_data:
  redis_data:
  jindungo_vendor:
  jindungo_bootstrap_cache:
  jindungo_storage_framework:
