services:
  mysql:
    image: mysql:8.0
    container_name: jindungo_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jindungo
      MYSQL_USER: jindungo
      MYSQL_PASSWORD: jindungo
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jindungo_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: jindungo_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy

  backend:
    build:
      context: ./docker/php
    container_name: jindungo_backend
    restart: unless-stopped
    expose:
      - "9000"
    volumes:
      # Código da app (bind mount Windows — lento)
      - ./backend:/app
      # vendor em volume nativo Linux — evita o maior gargalo de I/O no Windows
      - jindungo_vendor:/app/vendor
      - jindungo_bootstrap_cache:/app/bootstrap/cache
      - jindungo_storage_framework:/app/storage/framework
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/zz-uploads.ini
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      BCRYPT_ROUNDS: "10"
      APP_DEBUG: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: jindungo_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
  jindungo_vendor:
  jindungo_bootstrap_cache:
  jindungo_storage_framework:
